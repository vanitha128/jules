name: Go CI Pipeline

on:
  push:
    branches: [ "main", "master", "develop" ] # Adjust branch names as needed
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build-and-test:
    name: Build, Lint, and Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # Using Go 1.22 as per previous toolchain updates

      - name: Check out code
        uses: actions/checkout@v4

      - name: Install Tools (golangci-lint)
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH # Ensure tools are in PATH

      - name: Verify Go Modules
        run: go mod tidy && git diff --exit-code go.mod go.sum # Ensures go.mod/sum are up-to-date

      - name: Vet and Lint
        run: |
          go vet ./...
          golangci-lint run ./...

      - name: Run Unit Tests
        # This command excludes integration tests by path.
        # It also generates a coverage report for unit tests.
        run: go test -v -race -coverprofile=coverage-unit.out $(go list ./... | grep -v /tests/integration)

      - name: Build Application
        run: go build -v -o ./build/app ./cmd/server/main.go

